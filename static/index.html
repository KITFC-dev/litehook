<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.21/dist/sweetalert2.min.css" rel="stylesheet">
    <title>Litehook Web Dashboard</title>
</head>
<body>
    <h1>Litehook Dashboard</h1>
    <section id="health">
        <div id="health-container">
            <h2 id="health-sources-count"></h2>
        </div>
    </section>
    <hr>
    <section id="sources">
        <div id="sources-container">
            <div id="sources-header">
                <h2>Sources</h2>
                <button class="source-control success" data-action="add" data-id="">
                    <i data-lucide="plus"></i> Add Source
                </button>
            </div>
            <div id="sources-list"></div>
        </div>
    </section>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.21/dist/sweetalert2.all.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
